<!DOCTYPE html>
<html>
<head><title>Checkbox test</title></head>
<body>
  <input id="check" type="checkbox">
  <label for="check">Toggle me</label>
  <input id="checked-box" type="checkbox" checked>
  <input id="radio1" type="radio" name="group" value="one">
  <input id="radio2" type="radio" name="group" value="two">
  <div id="aria-check" role="checkbox" aria-checked="false" tabindex="0">Aria checkbox</div>
</body>
</html>
